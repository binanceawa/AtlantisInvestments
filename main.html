<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtlantisInvestments — WizardFinance Platform</title>
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #1a2234;
      --border: #2d3748;
      --text: #f0f4f8;
      --text-muted: #94a3b8;
      --accent: #0ea5e9;
      --accent-hover: #38bdf8;
      --teal: #14b8a6;
      --gold: #eab308;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --font-sans: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      --radius: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    .wallet-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
    }
    .wallet-badge.connected { border-color: var(--success); color: var(--success); }
    nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    nav button {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    nav button:hover, nav button.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    .panel {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .panel.visible { display: block; }
    .panel h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .form-group {
      margin-bottom: 1rem;
    }
